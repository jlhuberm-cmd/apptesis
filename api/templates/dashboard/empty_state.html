<!-- empty_state.html — Estado vacío / datos insuficientes -->
<div class="bg-white rounded-2xl shadow-sm p-10 text-center max-w-xl mx-auto mt-6">
  <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-primary mb-4">
    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-6h13M9 17H4l3-3m0 0l-3-3m3 3h13M3 7h13"/></svg>
  </div>
  <h2 class="text-xl font-bold text-primary mb-2">Aún no hay datos suficientes</h2>
  <p class="text-sm text-gray-500 mb-1">
    {% if reason %}{{ reason }}{% else %}Carga un archivo CSV con respuestas para ver el análisis.{% endif %}
  </p>
  {% if 'cargar_csv' in current_permisos %}
  <a href="/admin/encuestas" class="inline-block bg-primary hover:bg-blue-900 text-white text-sm px-5 py-2.5 rounded-lg transition">
    Administrar encuestas
  </a>
  {% endif %}
</div>
