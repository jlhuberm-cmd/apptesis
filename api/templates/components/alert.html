<!-- alert.html — Componente de alerta (success/error/warning/info) -->
<!-- Espera la variable `alert` con {category, message} -->
{% set styles = {
  'success': 'bg-green-50 border-success text-green-800',
  'error':   'bg-red-50 border-danger text-red-800',
  'warning': 'bg-orange-50 border-secondary text-orange-800',
  'info':    'bg-blue-50 border-primary text-blue-900'
} %}
<div x-data="{ show: true }"
     x-show="show"
     x-init="setTimeout(() => show = false, 6000)"
     x-transition.opacity.duration.300ms
     role="alert"
     class="flex items-start gap-3 border-l-4 rounded-md px-4 py-3 shadow-sm {{ styles.get(alert.category, styles['info']) }}">
  <svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    {% if alert.category == 'success' %}
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    {% elif alert.category == 'error' %}
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    {% elif alert.category == 'warning' %}
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86l-8.48 14.7A1 1 0 002.66 20h18.68a1 1 0 00.86-1.44l-8.48-14.7a1 1 0 00-1.72 0z"/>
    {% else %}
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    {% endif %}
  </svg>
  <p class="text-sm flex-1">{{ alert.message }}</p>
  <button @click="show = false" class="opacity-60 hover:opacity-100" aria-label="Cerrar">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>
</div>
